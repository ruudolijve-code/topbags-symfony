services:
  mailhog:
    image: mailhog/mailhog
    container_name: topbags-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  php:
    build: ./docker/php
    container_name: topbags-php
    volumes:
      - ./:/var/www/html
      - ./public/media:/var/www/html/public/media
    environment:
      APP_ENV: dev
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: topbags-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./public/media:/var/www/html/public/media
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: topbags-db
    environment:
      MYSQL_DATABASE: topbags
      MYSQL_USER: topbags
      MYSQL_PASSWORD: topbags
      MYSQL_ROOT_PASSWORD: root
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: topbags-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: topbags-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: topbags-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_SECURITY_PLUGIN: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearchdata:/usr/share/opensearch/data
    restart: unless-stopped

volumes:
  dbdata:
  opensearchdata: