# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    app.url: '%env(APP_URL)%'

    app.mailer_from_email: '%env(APP_MAILER_FROM_EMAIL)%'
    app.mailer_from_name: '%env(APP_MAILER_FROM_NAME)%'
    app.contact_to_email: '%env(APP_CONTACT_TO_EMAIL)%'
    app.contact_to_name: '%env(APP_CONTACT_TO_NAME)%'
    app.order_admin_email: '%env(APP_ORDER_ADMIN_EMAIL)%'
    app.order_admin_name: '%env(APP_ORDER_ADMIN_NAME)%'

    postnl.api_key: '%env(string:POSTNL_API_KEY)%'
    postnl.customer_code: '%env(string:POSTNL_CUSTOMER_CODE)%'
    postnl.mode: '%env(string:POSTNL_MODE)%'

    shop.shipping.free_from: 49.00
    shop.shipping.default_cost: 7.95

    ga4.measurement_id: '%env(string:GA4_MEASUREMENT_ID)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $fromEmail: '%app.mailer_from_email%'
            string $fromName: '%app.mailer_from_name%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Kernel.php'
            - '../src/**/Entity/'
            - '../src/**/Entities/'
            - '../src/**/Tests/'

    App\Contact\Service\ContactMailer:
        arguments:
            $toEmail: '%app.contact_to_email%'
            $toName: '%app.contact_to_name%'

    App\Shop\Service\MollieService:
        arguments:
            $mollieApiKey: '%env(MOLLIE_API_KEY)%'

    App\Shop\Service\OrderMailer:
        arguments:
            $adminEmail: '%app.order_admin_email%'
            $adminName: '%app.order_admin_name%'
            $fromEmail: '%app.mailer_from_email%'
            $fromName: '%app.mailer_from_name%'

    App\Shop\Service\PostNLService:
        arguments:
            $apiKey: '%postnl.api_key%'
            $customerCode: '%postnl.customer_code%'
            $mode: '%postnl.mode%'

    App\Shop\Service\ShippingCalculator:
        arguments:
            $freeFrom: '%shop.shipping.free_from%'
            $defaultCost: '%shop.shipping.default_cost%'

    App\Catalog\Service\VariantImageUploader:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Twig\AppGlobals:
        arguments:
            $ga4MeasurementId: '%ga4.measurement_id%'
            