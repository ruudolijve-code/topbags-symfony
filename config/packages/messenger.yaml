
framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    queue_name: newsletter
                retry_strategy:
                    max_retries: 3
                    delay: 60000
                    multiplier: 2
                    max_delay: 600000

            failed:
                dsn: 'doctrine://default?auto_setup=0'
                options:
                    queue_name: failed

        routing:
            App\Marketing\Message\SendNewsletterMessage: async
            App\Marketing\Message\SendNewsletterTestMessage: async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
                failed: 'in-memory://'
